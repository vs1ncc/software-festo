function t(key){ return (T[state.lang]||T.ru)[key] || key; }
function fmt(n, suf=''){
  const cur = CURRENCIES[state.currency]||CURRENCIES.RUB;
  const val = Math.round(+n * cur.r);
  return cur.s + val.toLocaleString() + suf;
}
function isMobile(){
  if(state.viewMode==='mobile') return true;
  if(state.viewMode==='desktop') return false;
  return window.innerWidth < 768;
}

// ── UI COMPONENTS ────────────────────────────────────────────────────────────
function badge(status){
  const c = C();
  const map = {active:{col:c.green,bg:'rgba(0,224,150,0.1)',lbl:t('active')},preparing:{col:c.yellow,bg:'rgba(255,214,10,0.1)',lbl:t('preparing')},ready:{col:c.blue,bg:'rgba(75,123,255,0.1)',lbl:t('ready')},delivered:{col:c.green,bg:'rgba(0,224,150,0.1)',lbl:t('delivered')},'on-leave':{col:c.muted,bg:'rgba(112,112,160,0.1)',lbl:t('on-leave')}};
  const s = map[status]||{col:c.muted,bg:'rgba(112,112,160,0.1)',lbl:status};
  return `<span style="background:${s.bg};color:${s.col};border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;white-space:nowrap">${s.lbl}</span>`;
}
function btn(label, action, variant='primary', sz='md'){
  const c = C();
  const bg = variant==='primary' ? `linear-gradient(135deg,${c.acc},${c.acc}CC)` : variant==='ghost' ? c.surf : 'transparent';
  const col = variant==='primary' ? '#fff' : c.text;
  const bord = variant==='secondary' ? `1px solid ${c.border}` : variant==='ghost' ? `1px solid ${c.border}` : 'none';
  const pad = sz==='sm' ? '6px 11px' : sz==='lg' ? '12px 22px' : '9px 15px';
  return `<button data-action="${action}" style="background:${bg};color:${col};border:${bord};border-radius:10px;padding:${pad};font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-family:inherit;transition:all 0.15s">${label}</button>`;
}
function inputField(label, id, val='', type='text', ph=''){
  const c = C();
  return `<div style="margin-bottom:14px"><label style="display:block;color:${c.muted};font-size:11px;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em">${label}</label><input id="${id}" type="${type}" value="${val}" placeholder="${ph}" style="width:100%;background:${c.inputBg};border:1px solid ${c.border};border-radius:10px;padding:11px 14px;color:${c.text};font-size:14px;outline:none;box-sizing:border-box;font-family:inherit"/></div>`;
}
function selectField(label, id, val, opts){
  const c = C();
  const options = opts.map(o=>`<option value="${o.v}" ${o.v===val?'selected':''}>${o.l}</option>`).join('');
  return `<div style="margin-bottom:14px"><label style="display:block;color:${c.muted};font-size:11px;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em">${label}</label><select id="${id}" style="width:100%;background:${c.inputBg};border:1px solid ${c.border};border-radius:10px;padding:11px 14px;color:${c.text};font-size:14px;outline:none;box-sizing:border-box;font-family:inherit;cursor:pointer">${options}</select></div>`;
}

// ── BAR CHART ────────────────────────────────────────────────────────────────
function barChart(data){
  const c = C();
  const max = Math.max(...data.map(d=>d.v));
  const bars = data.map((d,i)=>{
    const pct = (d.v/max)*100;
    const isLast = i===data.length-1;
    const bg = isLast ? `linear-gradient(180deg,${c.acc},${c.acc}CC)` : `linear-gradient(180deg,${c.border}90,${c.border}40)`;
    const shadow = isLast ? `box-shadow:0 0 10px rgba(${c.accRGB},0.3)` : '';
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
      <div style="width:100%;height:84px;display:flex;align-items:flex-end">
        <div style="width:100%;height:${pct}%;background:${bg};border-radius:4px 4px 0 0;${shadow}"></div>
      </div>
      <span style="font-size:9px;color:${c.dim}">${d.d}</span>
    </div>`;
  }).join('');
  return `<div style="display:flex;align-items:flex-end;gap:6px;height:100px">${bars}</div>`;
}

// ── MINI CHART ───────────────────────────────────────────────────────────────
function miniChart(data, color){
  const c = C(); const col = color||c.acc;
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1;
  const w=120,h=40;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/range)*(h-6)-3}`).join(' ');
  const area=`${pts} ${w},${h} 0,${h}`;
  const uid='g'+Math.random().toString(36).slice(2);
  return `<svg width="${w}" height="${h}" style="overflow:visible"><defs><linearGradient id="${uid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity="0.3"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs><polygon points="${area}" fill="url(#${uid})"/><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function statCard(title, value, sub, trend, iconName, color, chartData){
  const c = C(); const mob = isMobile();
  const col = color||c.acc;
  const trendCol = trend>0 ? c.green : '#FF6B6B';
  return `<div style="background:${c.card};border:1px solid ${c.border};border-radius:14px;padding:${mob?'14px 16px':'18px 20px'}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div>
        <div style="font-size:10px;color:${c.muted};margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em">${title}</div>
        <div style="font-size:${mob?20:26}px;font-weight:700;color:${c.text};letter-spacing:-0.02em">${value}</div>
      </div>
      <div style="background:rgba(${c.accRGB},0.1);border-radius:10px;padding:8px;flex-shrink:0">${icon(iconName,18,col)}</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:4px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:5px">
        <span style="color:${trendCol};font-size:12px;font-weight:600">${trend>0?'↑':'↓'} ${Math.abs(trend)}%</span>
        <span style="color:${c.dim};font-size:11px">${sub}</span>
      </div>
      ${!mob && chartData ? miniChart(chartData,col) : ''}
    </div>
  </div>`;
}

  const expense = state.finances.filter(f=>f.type==='expense').reduce((s,f)=>s+Math.abs(f.amount),0);
  const profit = income-expense;
  const summaries = [
    {l:t('income'),v:`+${fmt(income)}`,col:c.green,bg:'rgba(0,224,150,0.06)',bord:'rgba(0,224,150,0.15)',ico:'download'},

      <div style="background:${c.card};border:1px solid ${c.border};border-radius:14px;padding:${mob?'16px':'22px'}">

        ${roles.map(r=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid ${c.border}">
          <div style="width:32px;height:32px;border-radius:8px;background:rgba(${c.accRGB},0.08);display:flex;align-items:center;justify-content:center">${icon(r.ico,16,c.acc)}</div>
          <div style="flex:1"><div style="color:${c.text};font-size:13px;font-weight:600">${r.r}</div><div style="color:${c.dim};font-size:11px">${r.p}</div></div>
          ${btn(icon('settings',12,c.muted)+' '+t('configure'),'noop','ghost','sm')}
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

// ── MODALS ───────────────────────────────────────────────────────────────────
function buildModal(){
  if(!state.modal) return '';
  const c = C();
  if(state.modal==='addDish') return modal(t('newDish'), `
    ${inputField(t('dishName'),'newDishName','','text','Tom Yum')}
    ${selectField(t('cat'),'newDishCat','Main',[{v:'Main',l:'Main'},{v:'Soups',l:'Soups'},{v:'Starters',l:'Starters'},{v:'Desserts',l:'Desserts'}])}
    ${inputField(t('sellP'),'newDishPrice','','number','1200')}
    ${inputField(t('costP'),'newDishCost','','number','380')}
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">${btn(t('cancel'),'closeModal','secondary')} ${btn(t('create'),'addDishConfirm')}</div>`);
  if(state.modal==='addIngr') return modal(t('newIngr'), `
    ${inputField(t('name'),'newIngrName','','text','Креветки')}
    ${inputField(t('supp'),'newIngrSupp','','text','OceanFresh')}
    ${inputField(t('costPer'),'newIngrCost','','number','1800')}
    ${inputField(t('stockLbl'),'newIngrStock','','number','10')}
    ${inputField(t('minSt'),'newIngrMin','','number','5')}
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">${btn(t('cancel'),'closeModal','secondary')} ${btn(t('addIngr'),'addIngrConfirm')}</div>`);
  if(state.modal==='addStaff') return modal(t('newEmp'), `
    ${inputField(t('fullName'),'newStaffName','','text','Иванов Иван')}
    ${inputField(t('pos'),'newStaffRole','','text','Шеф-повар')}
    ${inputField(t('hourly'),'newStaffRate','','number','850')}
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">${btn(t('cancel'),'closeModal','secondary')} ${btn(t('addStaff'),'addStaffConfirm')}</div>`);
  if(state.modal==='addRest') return modal(t('newRest'), `
    ${inputField(t('restName'),'newRestName','','text','La Bella Italia')}
    ${inputField(t('cuisine'),'newRestCuisine','','text','Italian')}
    ${inputField(t('subd'),'newRestSubd','','text','labella.festo.io')}
    ${inputField(t('ownD'),'newRestDomain','','text','labella.com')}
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">${btn(t('cancel'),'closeModal','secondary')} ${btn(t('createRest'),'addRestConfirm')}</div>`);
  return '';
}

// ── MAIN BUILD ───────────────────────────────────────────────────────────────
function buildApp(){
  const c = C(); const mob = isMobile();
  const pages = {dashboard:pageDashboard,restaurants:pageRestaurants,menu:pageMenu,orders:pageOrders,inventory:pageInventory,finance:pageFinance,staff:pageStaff,analytics:pageAnalytics,settings:pageSettings};
  const pageContent = (pages[state.page]||pageDashboard)();
  const viewBar = state.viewMode!=='auto' ? `<div style="position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,${c.acc},#8B5CF6);z-index:9999;box-shadow:0 0 10px rgba(${c.accRGB},0.5)"></div>` : '';

  return `
  <div style="display:flex;height:100vh;background:${c.bg};color:${c.text};overflow:hidden;position:relative">
    ${viewBar}
    ${sidebar()}
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0">
      ${topBar()}
      ${pageContent}
    </div>
    ${state.notifOpen ? notifPanel() : ''}
    ${buildModal()}
  </div>`;
}

// ── EVENTS ───────────────────────────────────────────────────────────────────
function bindEvents(){
  document.addEventListener('click', handleClick, {once:true});
  document.addEventListener('change', handleChange);

  // input focus styles
  document.querySelectorAll('input,select').forEach(el=>{
    el.addEventListener('focus',()=>el.style.borderColor=state.accent);
    el.addEventListener('blur',()=>{ const c=C(); el.style.borderColor=c.border; });
  });
}

function handleClick(e){
  const el = e.target.closest('[data-action]');
  if(!el){ document.addEventListener('click',handleClick,{once:true}); return; }
  const action = el.dataset.action;

  if(action==='noop'){}
  else if(action.startsWith('nav-')){ setState({page:action.slice(4),sidebarOpen:false}); }
  else if(action==='openSidebar'){ setState({sidebarOpen:true}); }
  else if(action==='closeSidebar'){ setState({sidebarOpen:false}); }
  else if(action==='toggleDark'){ setState({dark:!state.dark}); }
  else if(action==='setDark'){ setState({dark:true}); }
  else if(action==='setLight'){ setState({dark:false}); }
  else if(action==='toggleNotif'){ setState({notifOpen:!state.notifOpen}); }
  else if(action==='closeNotif'){ setState({notifOpen:false}); }
  else if(action==='markAllRead'){ setState({notifs:state.notifs.map(n=>({...n,read:true})),notifOpen:true}); }
  else if(action==='openAddDish'){ setState({modal:'addDish'}); }
  else if(action==='openAddIngr'){ setState({modal:'addIngr'}); }
  else if(action==='openAddStaff'){ setState({modal:'addStaff'}); }
  else if(action==='openAddRest'){ setState({modal:'addRest'}); }
  else if(action==='closeModal'){ setState({modal:null}); }
  else if(action.startsWith('menuFilter-')){ setState({menuFilter:action.slice(11)}); }
  else if(action.startsWith('setAccent-')){ setState({accent:action.slice(10)}); }
  else if(action.startsWith('setViewMode-')){ setState({viewMode:action.slice(12)}); }
  else if(action==='saveSettings'){
    const restNameEl = document.getElementById('restNameInput');
    const langEl = document.getElementById('langSelectSettings');
    const curEl = document.getElementById('curSelectSettings');
    const updates = {};
    if(restNameEl) updates.restName = restNameEl.value||state.restName;
    if(langEl) updates.lang = langEl.value;
    if(curEl) updates.currency = curEl.value;
    setState(updates);
  }
  else if(action==='addDishConfirm'){
    const name = document.getElementById('newDishName')?.value;
    const cat = document.getElementById('newDishCat')?.value||'Main';
    const price = parseFloat(document.getElementById('newDishPrice')?.value)||0;
    const cost = parseFloat(document.getElementById('newDishCost')?.value)||0;
    if(name){ setState(s=>({...s,menuItems:[...s.menuItems,{id:Date.now(),name,cat,price,cost,stock:50,hit:false,isNew:true}],modal:null})); }
  }
  else if(action==='addIngrConfirm'){
    const name = document.getElementById('newIngrName')?.value;
    const supp = document.getElementById('newIngrSupp')?.value||'';
    const cost = parseFloat(document.getElementById('newIngrCost')?.value)||0;
    const stock = parseFloat(document.getElementById('newIngrStock')?.value)||0;
    const minStock = parseFloat(document.getElementById('newIngrMin')?.value)||0;
    if(name){ setState(s=>({...s,ingredients:[...s.ingredients,{id:Date.now(),name,cat:'Прочее',cost,stock,minStock,unit:'кг',supp}],modal:null})); }
  }
  else if(action==='addStaffConfirm'){
    const name = document.getElementById('newStaffName')?.value;
    const role = document.getElementById('newStaffRole')?.value||'';
    const rate = parseFloat(document.getElementById('newStaffRate')?.value)||0;
    if(name){ setState(s=>({...s,staffList:[...s.staffList,{id:Date.now(),name,role,rate,hours:0,status:'active'}],modal:null})); }
  }
  else if(action==='addRestConfirm'){
    const name = document.getElementById('newRestName')?.value;
    const cuisine = document.getElementById('newRestCuisine')?.value||'';
    if(name){ setState(s=>({...s,restaurants:[...s.restaurants,{id:Date.now(),name,cuisine,orders:0,revenue:0,status:'active'}],modal:null})); }
  }

  document.addEventListener('click',handleClick,{once:true});
}

function handleChange(e){
  if(e.target.id==='langSelect'){ setState({lang:e.target.value}); }
  else if(e.target.id==='curSelect'){ setState({currency:e.target.value}); }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  clearTimeout(renderTimeout);
  renderTimeout = setTimeout(render,50);
});
render();
</script>
